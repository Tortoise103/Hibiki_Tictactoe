<style>
  :root{
    --bg:#F2ECFB;
    --bg2:#E7DBFB;
    --ink:#3A2A4D;
    --pink:#FF6FA5;
    --teal:#3FBFAE;
    --card:#FFFFFF;
    --line:#D8C9F2;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:'Baloo 2','Jua',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 20% 15%, var(--bg2), transparent 55%),
      radial-gradient(circle at 85% 80%, var(--bg2), transparent 50%),
      var(--bg);
    overflow:hidden;
  }
  #app{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  .screen{
    display:none; flex-direction:column; align-items:center;
    width:100%; max-width:460px; padding:20px 20px 28px;
    animation:fadeIn .35s ease;
  }
  .screen.active{display:flex;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  h1.logo{ font-family:'Jua',sans-serif; font-size:28px; margin:0 0 6px; text-align:center; color:var(--ink); }
  h1.logo span{color:var(--pink);}
  p.tagline{ margin:0 0 14px; font-size:13px; color:#8C7AAE; text-align:center; }

  /* ---------- 캐릭터 (실제 그림) ---------- */
  .character-wrap{
    position:relative;
    width:min(88vw, 420px);
    aspect-ratio:1/1;
    margin:0 auto 6px;
    filter:drop-shadow(0 10px 14px rgba(150,110,200,.18));
  }
  .face-img{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:contain;
    pointer-events:none;
    user-select:none;
    -webkit-user-drag:none;
  }
  .face-img.blink-layer{
    opacity:0;
    animation:blinkAnim 4.2s infinite ease-in-out;
  }
  @keyframes blinkAnim{
    0%, 88%, 100%{opacity:0;}
    92%{opacity:1;}
    96%{opacity:0;}
  }

  /* 그림에 이미 그려진 '#' 격자 위치에 정확히 맞춘 클릭 영역 */
  .forehead-grid{
    position:absolute;
    left:35.91%; top:35.57%;
    width:28.64%; height:24.20%;
    z-index:5;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
  }
  .cell{
    background:transparent;
    border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    user-select:none;
    transition:background .15s ease;
  }
  .cell:hover{background:rgba(255,255,255,.35);}
  .cell.win{background:rgba(255,111,165,.30);}
  .cell img.mark{
    width:100%; height:100%;
    object-fit:contain;
    pointer-events:none;
    user-select:none;
    -webkit-user-drag:none;
  }

  /* ---------- 버튼 ---------- */
  .btn{
    width:100%; max-width:280px; padding:14px 18px; margin:6px 0;
    border:none; border-radius:16px; background:var(--card);
    box-shadow:0 4px 0 var(--line); font-family:'Jua',sans-serif;
    font-size:16px; color:var(--ink); cursor:pointer;
    transition:transform .1s ease, box-shadow .1s ease;
  }
  .btn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--line);}
  .btn.primary{background:var(--pink); color:#fff; box-shadow:0 4px 0 #C94F7C;}
  .btn.primary:active{box-shadow:0 1px 0 #C94F7C;}
  .btn.ghost{background:transparent; box-shadow:none; color:#8C7AAE; font-size:14px;}
  .menu-buttons{width:100%; display:flex; flex-direction:column; align-items:center; margin-top:8px;}

  .option-row{ width:100%; max-width:300px; background:var(--card); border-radius:16px; padding:14px 16px; margin-bottom:14px; }
  .option-row label{ display:block; font-size:13px; color:#8C7AAE; margin-bottom:8px; }
  input[type=range]{width:100%; accent-color:var(--pink);}
  .lang-toggle{display:flex; flex-wrap:wrap; gap:8px;}
  .lang-toggle button{
    flex:1 1 calc(50% - 8px); padding:8px; border-radius:10px; border:2px solid var(--line);
    background:#fff; font-family:'Baloo 2'; cursor:pointer; font-size:13px; font-weight:700;
  }
  .lang-toggle button.active{background:var(--pink); color:#fff; border-color:var(--pink);}

  .turn-indicator{
    display:flex; align-items:center; gap:8px; background:var(--card);
    padding:8px 16px; border-radius:20px; font-size:14px; margin-bottom:10px;
  }
  .turn-dot{width:12px; height:12px; border-radius:50%;}
  .turn-dot.x{background:var(--pink);}
  .turn-dot.o{background:var(--teal);}

  .result-text{ font-family:'Jua',sans-serif; font-size:22px; margin:12px 0 16px; text-align:center; }
  .row-btns{display:flex; gap:10px; width:100%; max-width:300px;}
</style>
</head>
<body>
<div id="app">

  <!-- 메인 메뉴 -->
  <div class="screen active" id="screen-menu">
    <h1 class="logo" data-i18n="title"></h1>

let lang = "ko";

function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.getAttribute("data-i18n");
    el.innerHTML = I18N[lang][key];
  });
  ["ko","en","ja","it"].forEach(l=>{
    document.getElementById("lang-"+l).classList.toggle("active", lang===l);
  });
}
function setLang(l){
  lang = l;
  applyI18n();
  if(document.getElementById("screen-game").classList.contains("active")){
    updateTurnText();
  }
}

/* ---------------- 화면 전환 ---------------- */
function showScreen(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+name).classList.add("active");
}

/* ---------------- 오디오 (실제 배경음악) ---------------- */
let bgmStarted=false;
const bgmEl = document.getElementById("bgm");

function ensureAudio(){
  bgmEl.volume = document.getElementById("volumeSlider").value/100;
  if(bgmStarted) return;
  bgmEl.muted = false;
  if(bgmEl.paused){
    // 음소거 자동재생조차 막힌 경우를 대비한 폴백
    bgmEl.play().catch(()=>{});
  }
  bgmStarted = true;
}
bgmEl.addEventListener("error", ()=>{
  console.warn("bgm.mp3를 찾을 수 없습니다. html 파일과 같은 폴더에 있는지 확인하세요.");
});
document.getElementById("volumeSlider").addEventListener("input", e=>{
  ensureAudio();
  bgmEl.volume = e.target.value/100;
});

/* ---------------- 틱택토 로직 ---------------- */
let board, currentPlayer, currentMode, gameOver;
const WIN_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function startGame(mode){
  currentMode = mode;
  board = Array(9).fill(null);
  currentPlayer = "X";
  gameOver = false;
  document.getElementById("game-mode-title").textContent =
    mode==="pve" ? (lang==="ko"?"솔로 모드":"Solo Mode") : (lang==="ko"?"2인용 모드":"2P Mode");
  renderBoard(document.getElementById("board"));
  updateTurnText();
  showScreen("game");
}

function renderBoard(container){
  container.innerHTML = "";
  board.forEach((val,i)=>{
    const cell = document.createElement("div");
    cell.className = "cell";
    if(val){
      const img = document.createElement("img");
      img.className = "mark";
      img.src = MARK_IMAGES[val][i];
      img.alt = val;
      cell.appendChild(img);
    }
    cell.onclick = ()=>handleCellClick(i);
    container.appendChild(cell);
  });
}

function updateTurnText(){
  document.getElementById("turn-dot").className = "turn-dot " + currentPlayer.toLowerCase();
  let key;
  if(currentMode==="pve"){
    key = currentPlayer==="X" ? "yourTurn" : "aiTurn";
  } else {
    key = currentPlayer==="X" ? "p1Turn" : "p2Turn";
  }
  document.getElementById("turn-text").textContent = I18N[lang][key];
}

function handleCellClick(i){
  if(gameOver || board[i]) return;
  if(currentMode==="pve" && currentPlayer==="O") return; // AI 턴에는 클릭 무시

  place(i, currentPlayer);

  const winInfo = checkWin();
  if(winInfo || board.every(c=>c)){
    finishGame(winInfo);
    return;
  }

  currentPlayer = currentPlayer==="X" ? "O" : "X";
  updateTurnText();

  if(currentMode==="pve" && currentPlayer==="O" && !gameOver){
    setTimeout(aiMove, 450);
  }
}

function place(i, player){
  board[i] = player;
  renderBoard(document.getElementById("board"));
}

function aiMove(){
  if(gameOver) return;
  const i = bestMove();
  place(i, "O");
  const winInfo = checkWin();
  if(winInfo || board.every(c=>c)){
    finishGame(winInfo);
    return;
  }
  currentPlayer = "X";
  updateTurnText();
}

// 미니맥스 AI (최선의 수를 둠)
function bestMove(){
  let bestScore = -Infinity, move = null;
  for(let i=0;i<9;i++){
    if(!board[i]){
      board[i] = "O";
      const score = minimax(board, 0, false);
      board[i] = null;
      if(score > bestScore){ bestScore = score; move = i; }
    }
  }
  return move;
}
function minimax(bd, depth, isMax){
  const winner = evaluateWinner(bd);
  if(winner==="O") return 10 - depth;
  if(winner==="X") return depth - 10;
  if(bd.every(c=>c)) return 0;

  if(isMax){
    let best = -Infinity;
    for(let i=0;i<9;i++){
      if(!bd[i]){ bd[i]="O"; best = Math.max(best, minimax(bd, depth+1, false)); bd[i]=null; }
    }
    return best;
  } else {
    let best = Infinity;
    for(let i=0;i<9;i++){
      if(!bd[i]){ bd[i]="X"; best = Math.min(best, minimax(bd, depth+1, true)); bd[i]=null; }
    }
    return best;
  }
}
function evaluateWinner(bd){
  for(const [a,b,c] of WIN_LINES){
    if(bd[a] && bd[a]===bd[b] && bd[b]===bd[c]) return bd[a];
  }
  return null;
}
function checkWin(){
  for(const line of WIN_LINES){
    const [a,b,c] = line;
    if(board[a] && board[a]===board[b] && board[b]===board[c]){
      return {winner:board[a], line};
    }
  }
  return null;
}

function finishGame(winInfo){
  gameOver = true;
  if(winInfo){
    winInfo.line.forEach(idx=>{
      document.getElementById("board").children[idx].classList.add("win");
    });
  }
  setTimeout(()=>{
    renderBoard(document.getElementById("board-result"));
    if(winInfo){
      winInfo.line.forEach(idx=>{
        document.getElementById("board-result").children[idx].classList.add("win");
      });
    }
    let text;
    if(!winInfo){
      text = I18N[lang].draw;
    } else if(currentMode==="pve"){
      text = winInfo.winner==="X" ? I18N[lang].youWin : I18N[lang].youLose;
    } else {
      text = winInfo.winner==="X" ? I18N[lang].winX : I18N[lang].winO;
    }
    document.getElementById("result-text").textContent = text;
    showScreen("result");
  }, 700);
}

function quitToMenu(){
  showScreen("menu");
}

/* ---------------- 초기화 ---------------- */
document.body.addEventListener("click", ensureAudio, {once:true});
applyI18n();
